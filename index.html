<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayer Dashboard - Productividad</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bayer-blue: #0091df;
            --bayer-green: #89ba17;
            --bg-light: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: #333;
        }
        header {
            background-color: white;
            padding: 1rem 2rem;
            border-bottom: 4px solid var(--bayer-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--bayer-blue);
            text-transform: uppercase;
        }
        .container {
            padding: 2rem;
            max-width: 1200px;
            margin: auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--bayer-blue);
        }
        .card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
        }
        .card .value {
            font-size: 2rem;
            font-weight: bold;
            margin: 0.5rem 0;
            color: var(--bayer-blue);
        }
        .table-container {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #eee;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        tr:hover {
            background-color: #f1f8ff;
        }
        #loading {
            text-align: center;
            padding: 2rem;
            font-weight: bold;
            color: var(--bayer-blue);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Bayer Dashboard</div>
    <div style="color: #666; font-size: 0.9rem;">Resumen de Productividad</div>
</header>

<div class="container">
    <div class="stats-grid">
        <div class="card">
            <h3>Total Visitas</h3>
            <div class="value" id="totalVisitas">0</div>
        </div>
        <div class="card" style="border-left-color: var(--bayer-green);">
            <h3>Puntos de Venta</h3>
            <div class="value" id="totalPuntos">0</div>
        </div>
        <div class="card">
            <h3>Estado de Red</h3>
            <div class="value" id="status" style="font-size: 1rem;">Conectando...</div>
        </div>
    </div>

    <div class="table-container">
        <div id="loading">Cargando datos desde Google Sheets...</div>
        <table>
            <thead>
                <tr>
                    <th>Empleado</th>
                    <th>Punto de Venta</th>
                    <th>Fecha</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Tiempo</th>
                    <th>Ciudad</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // URL de tu hoja de Productividad
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsz11gB_eV1oQXGCkRzzSqoFYZJPDi7dkjO4FgUXADtqZYCjTuyHgeIciWQszgqEB_l4iSVF36qc4g/pubhtml?gid=1442986623&single=true';

    async function fetchData() {
        try {
            // Usamos un proxy para evitar bloqueos de seguridad de Google
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(SHEET_URL);
            const response = await fetch(proxyUrl);
            
            if (!response.ok) throw new Error("Error en la respuesta del servidor");
            
            const data = await response.json();
            const html = data.contents;
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const table = doc.querySelector('table');
            
            if (!table) throw new Error("No se pudo leer la tabla del Sheet");

            // Saltamos las primeras filas de encabezado de Google
            const rows = Array.from(table.querySelectorAll('tr')).slice(1);
            let htmlContent = '';
            let puntosVenta = new Set();
            let count = 0;

            rows.forEach(row => {
                const cols = row.querySelectorAll('td');
                
                // Solo procesamos si la fila tiene datos (evitamos filas vacías)
                if (cols.length >= 7 && cols[0].innerText.trim() !== "") {
                    const empleado = cols[0]?.innerText || '-';
                    const pdv = cols[1]?.innerText || '-';
                    const fecha = cols[3]?.innerText || '-';
                    const checkIn = cols[4]?.innerText || '-';
                    const checkOut = cols[5]?.innerText || '-';
                    const tiempo = cols[6]?.innerText || '-';
                    const ciudad = cols[8]?.innerText || '-';

                    puntosVenta.add(pdv);
                    count++;

                    htmlContent += `
                        <tr>
                            <td>${empleado}</td>
                            <td>${pdv}</td>
                            <td>${fecha}</td>
                            <td>${checkIn}</td>
                            <td>${checkOut}</td>
                            <td>${tiempo}</td>
                            <td>${ciudad}</td>
                        </tr>`;
                }
            });

            document.getElementById('tableBody').innerHTML = htmlContent;
            document.getElementById('totalVisitas').innerText = count;
            document.getElementById('totalPuntos').innerText = puntosVenta.size;
            document.getElementById('status').innerText = "Sincronizado";
            document.getElementById('status').style.color = "var(--bayer-green)";
            document.getElementById('loading').style.display = 'none';

        } catch (error) {
            console.error('Error detallado:', error);
            document.getElementById('loading').innerHTML = 
                `<span style="color:red;">Error al cargar datos. Asegúrate de que el Sheet esté "Publicado en la Web".</span>`;
            document.getElementById('status').innerText = "Error";
            document.getElementById('status').style.color = "red";
        }
    }

    // Ejecutar al cargar la página
    fetchData();
</script>

</body>
</html>
